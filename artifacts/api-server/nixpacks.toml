[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm && pnpm install --filter @workspace/db --filter @workspace/api-server"]

[phases.build]
cmds = ["pnpm --filter @workspace/db run build", "pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
